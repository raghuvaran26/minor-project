<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Shadow Navigation</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
header{padding:15px;text-align:center;background:#1e293b;font-size:22px}

.container{max-width:1000px;margin:auto;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:12px;margin-top:20px}

#map{height:400px;border-radius:10px;margin-top:10px}

input{width:100%;padding:12px;border-radius:8px;border:none;margin-top:10px}

button{padding:10px 15px;border:none;border-radius:8px;margin-top:10px;cursor:pointer}

.green{background:#16a34a}
.yellow{background:#eab308}
.red{background:#dc2626}

.routes div{
padding:15px;margin-top:10px;border-radius:10px;
cursor:pointer;transition:0.3s;border:1px solid #334155;
}
.routes div:hover{transform:scale(1.03)}

.badge{background:#3b82f6;padding:4px 8px;border-radius:6px;font-size:12px;margin-left:5px}
.nav-btn{background:#2563eb;color:white;margin-top:8px}
</style>
</head>

<body>

<header>AI Shadow Navigation ⭐</header>

<div class="container">

<div class="card">
<h3>📍 Location</h3>
<button onclick="trackLocation()">Track Location</button>
<div id="map"></div>
</div>

<div class="card">
<h3>🛡 Find Safe Route</h3>
<input id="destination" placeholder="Enter destination">
<button onclick="generateRoutes()" class="green">Find Routes</button>
<div id="routes" class="routes"></div>
</div>

<div class="card">
<h3>🚨 Emergency</h3>
<button onclick="sendSOS()" class="red">SOS</button>
</div>

</div>

<script>
let map,userLocation,routeLayers=[],selectedLayer;
let selectedDestination=null;

// 📍 LOCATION
function trackLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
userLocation=[pos.coords.latitude,pos.coords.longitude];

map=L.map('map').setView(userLocation,13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

L.marker(userLocation).addTo(map).bindPopup("You").openPopup();
});
}

// 🚀 ROUTES
async function generateRoutes(){

if(!userLocation) return alert("Track location first");

let dest=document.getElementById("destination").value.trim();
if(!dest) return alert("Enter destination");

// geocode
let geo=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${dest}`);
let geoData=await geo.json();

if(!geoData.length) return alert("Location not found");

let destLat=parseFloat(geoData[0].lat);
let destLng=parseFloat(geoData[0].lon);

// save destination
selectedDestination=[destLat,destLng];

// marker
L.marker(selectedDestination).addTo(map).bindPopup("Destination");

// clear old routes
routeLayers.forEach(l=>map.removeLayer(l));
routeLayers=[];

// fetch routes
let res=await fetch(`https://router.project-osrm.org/route/v1/driving/${userLocation[1]},${userLocation[0]};${destLng},${destLat}?overview=full&geometries=geojson&alternatives=true`);
let data=await res.json();

let html="";

// ⭐ FIND NEAREST ROUTE
let nearestIndex=0;
let minDistance=Infinity;

data.routes.forEach((route,i)=>{
if(route.distance < minDistance){
minDistance = route.distance;
nearestIndex = i;
}
});

// ⭐ DRAW ROUTES
data.routes.forEach((route,i)=>{

let color,line,label;

// MAIN LOGIC
if(i === nearestIndex){
color="green";
line="#16a34a";
label="Nearest Safe Route";
}else{
color="yellow";
line="#eab308";
label="Alternative Route";
}

// draw route
let layer=L.geoJSON(route.geometry,{
style:{color:line,weight:6}
}).addTo(map);

routeLayers.push(layer);

// UI
html+=`
<div class="${color}" onclick="selectRoute(${i})">
<b>${label}</b> ${i===nearestIndex?'<span class="badge">⭐ Best</span>':''}<br>
Distance: ${(route.distance/1000).toFixed(2)} km<br>
Time: ${(route.duration/60).toFixed(0)} min<br>

<button class="nav-btn" onclick="event.stopPropagation(); navigateToDestination()">
🧭 Directions
</button>

</div>`;
});

// focus nearest
map.fitBounds(routeLayers[nearestIndex].getBounds());

document.getElementById("routes").innerHTML=html;
}

// 🎯 SELECT ROUTE
function selectRoute(i){
if(selectedLayer) selectedLayer.setStyle({weight:6});

selectedLayer=routeLayers[i];
selectedLayer.setStyle({weight:10});

map.fitBounds(selectedLayer.getBounds());
}

// 🧭 NAVIGATION (Google Maps)
function navigateToDestination(){
if(!userLocation || !selectedDestination) return alert("Missing data");

let url = `https://www.google.com/maps/dir/?api=1&origin=${userLocation[0]},${userLocation[1]}&destination=${selectedDestination[0]},${selectedDestination[1]}&travelmode=driving`;

window.open(url, "_blank");
}

// 🚨 SOS
function sendSOS(){
if(!userLocation) return;
alert(`SOS!\nLat:${userLocation[0]}\nLng:${userLocation[1]}`);
}
</script>

</body>
</html>
